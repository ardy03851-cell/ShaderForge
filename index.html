<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>STALKED</title>
  <style>
    :root {
      --ui-dim: rgba(255, 255, 255, 0.55);
      --ui-bright: #d8d8d8;
      --accent: #7a0000;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', Consolas, monospace;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--ui-bright);
      transition: opacity 1s ease;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #title {
      font-size: 2.4em;
      letter-spacing: 0.4em;
      color: #b3b3b3;
      text-shadow: 0 0 20px rgba(120, 0, 0, 0.6);
      margin-bottom: 0.3em;
    }

    #subtitle {
      font-size: 0.85em;
      color: var(--ui-dim);
      margin-bottom: 2.2em;
      letter-spacing: 0.05em;
    }

    #startBtn {
      background: none;
      border: 1px solid #555;
      color: #ccc;
      padding: 0.9em 2.4em;
      font-family: inherit;
      font-size: 1em;
      letter-spacing: 0.25em;
      cursor: pointer;
      transition: all .2s;
    }

    #startBtn:active {
      background: #222;
      border-color: #888;
    }

    #loadStatus {
      position: absolute;
      bottom: 2em;
      font-size: 0.7em;
      color: #555;
      letter-spacing: 0.1em;
      text-align: center;
      max-width: 80%;
    }

    #hud {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: none;
    }

    #hud.active {
      display: block;
    }

    /* vignette / darkness mask */
    #vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 55%, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.55) 60%, rgba(0, 0, 0, 0.97) 100%);
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 5px;
      height: 5px;
      margin: -2.5px 0 0 -2.5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
    }

    #flashToggleHint {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--ui-dim);
      font-size: 0.65em;
      letter-spacing: 0.08em;
      opacity: 0.6;
    }

    #fade {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2.5s ease;
    }

    #fade.show {
      opacity: 1;
    }

    #jumpscareImg {
      position: fixed;
      inset: 0;
      z-index: 45;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      pointer-events: none;
      filter: contrast(1.3) brightness(0.85);
      transition: opacity 0.06s linear;
    }

    #jumpscareImg.show {
      opacity: 1;
    }

    #deathScreen {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: #000;
      color: #999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      letter-spacing: 0.3em;
    }

    #deathScreen.show {
      display: flex;
    }

    #deathScreen span {
      color: var(--accent);
      font-size: 1.6em;
      margin-bottom: 1em;
      letter-spacing: 0.5em;
    }

    #restartBtn {
      margin-top: 1.5em;
      background: none;
      border: 1px solid #444;
      color: #999;
      padding: 0.7em 2em;
      font-family: inherit;
      font-size: 0.6em;
      letter-spacing: 0.2em;
      cursor: pointer;
    }

    /* ---------- Touch controls (iPad) ---------- */
    #touchControls {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
    }

    #touchControls.active {
      display: block;
    }

    #moveZone {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 45%;
      height: 55%;
      pointer-events: auto;
    }

    #lookZone {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 55%;
      height: 100%;
      pointer-events: auto;
    }

    #joystickBase {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.04);
      display: none;
    }

    #joystickThumb {
      position: absolute;
      width: 48px;
      height: 48px;
      margin: -24px 0 0 -24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.3);
      left: 50%;
      top: 50%;
    }

    #runBtn {
      position: absolute;
      right: 5%;
      bottom: 18%;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.06);
      color: var(--ui-dim);
      font-size: 0.6em;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      z-index: 21;
    }

    #runBtn.held {
      background: rgba(255, 255, 255, 0.22);
      color: #fff;
    }

    #flashBtn {
      position: absolute;
      right: 5%;
      bottom: 32%;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.06);
      color: var(--ui-dim);
      font-size: 1.3em;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      z-index: 21;
    }

    #desktopHint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--ui-dim);
      font-size: 0.6em;
      letter-spacing: 0.05em;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>

<body>

  <div id="overlay">
    <div id="title">S T A L K E D</div>
    <div id="subtitle">put on headphones. find the flashlight battery within you.</div>
    <button id="startBtn">ENTER</button>
    <div id="loadStatus"></div>
  </div>

  <div id="fade"></div>
  <img id="jumpscareImg" src="" alt="">

  <div id="deathScreen">
    <span>IT FOUND YOU</span>
    <div style="font-size:0.5em; color:#666;">YOU SURVIVED <span id="surviveTime">0</span> SECONDS</div>
    <button id="restartBtn">TRY AGAIN</button>
  </div>

  <div id="hud">
    <div id="vignette"></div>
    <div id="crosshair"></div>
    <div id="flashToggleHint">F / TAP BULB ICON — TOGGLE FLASHLIGHT</div>
  </div>

  <div id="touchControls">
    <div id="moveZone"></div>
    <div id="lookZone"></div>
    <div id="joystickBase">
      <div id="joystickThumb"></div>
    </div>
    <div id="runBtn">RUN</div>
    <div id="flashBtn">&#128161;</div>
  </div>

  <div id="desktopHint">WASD / ARROWS MOVE — MOUSE LOOK — SHIFT RUN — F FLASHLIGHT — CLICK TO LOCK MOUSE</div>

    <script src="three.min.js"></script>
  <script src="graphics.js"></script>
  <script src="camera.js"></script>
  <script src="game.js"></script>
</body>

</html>
