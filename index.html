<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Modular Canvas</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      touch-action: none;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      background: #ffffff;
      font-family: monospace;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #ffffff;
      z-index: 1;
    }

    /* Ultra Minimal Floating Strip */
    .toolbar {
      position: fixed;
      top: 12px;
      right: 12px;
      background: #ffffff;
      border: 2px solid #000000;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10;
      pointer-events: auto;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn {
      background: #ffffff;
      border: 2px solid #000000;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000000;
    }

    .btn:active,
    .btn.active {
      background: #000000;
      color: #ffffff;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.5;
    }

    .color-wrapper {
      position: relative;
      width: 22px;
      height: 22px;
      border: 2px solid #000000;
    }

    input[type="color"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      cursor: pointer;
    }

    select {
      border: 2px solid #000000;
      background: #ffffff;
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
      color: #000000;
      padding: 4px;
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      border-radius: 0;
    }

    /* Custom Modern Brutalist Select Component for Images */
    .custom-select {
      position: relative;
      display: inline-block;
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
    }

    .select-trigger {
      border: 2px solid #000000;
      padding: 4px 24px 4px 6px;
      background: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 140px;
    }

    .select-trigger::after {
      content: '▼';
      position: absolute;
      right: 6px;
      top: 6px;
      font-size: 8px;
    }

    .select-options {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #ffffff;
      border: 2px solid #000000;
      border-top: none;
      max-height: 240px;
      overflow-y: auto;
      z-index: 20;
    }

    .select-options.show {
      display: block;
    }

    .option-item {
      padding: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #e0e0e0;
    }

    .option-item:hover {
      background: #000000;
      color: #ffffff;
    }

    .option-item img {
      width: 35px;
      height: 16px;
      border: 1px solid #000000;
      background: #fff;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <canvas id="canvas"></canvas>

  <div class="toolbar">
    <div class="group">
      <button class="btn active" id="penBtn" title="Draw">
                <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </button>
      <button class="btn" id="eraserBtn" title="Erase">
                <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16c-1-1-1-3 0-4l9-9c1-1 3-1 4 0l4 4c1 1 1 3 0 4L12 20M15 5l4 4"/></svg>
            </button>
    </div>

    <div class="color-wrapper" id="colorIndicator">
      <input type="color" id="colorPicker" value="#000000">
    </div>

    <div class="custom-select" id="customBrushSelect">
      <div class="select-trigger" id="selectTrigger">Loading...</div>
      <div class="select-options" id="selectOptions"></div>
    </div>

    <select id="strokeWidth">
            <option value="2">TINY</option>
            <option value="6" selected>MED</option>
            <option value="16">WIDE</option>
            <option value="45">HUGE</option>
        </select>

    <button class="btn" id="clearBtn" title="Clear">
            <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
  </div>

  <script src="brushes.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { desynchronized: true });
        
        let isDrawing = false;
        let points = [];
        let mode = 'pen';
        let activeBrushKey = 'gelPen';
        let lastWidth = 6;
        
        const colorPicker = document.getElementById('colorPicker');
        const colorIndicator = document.getElementById('colorIndicator');
        const strokeWidth = document.getElementById('strokeWidth');
        const penBtn = document.getElementById('penBtn');
        const eraserBtn = document.getElementById('eraserBtn');
        const clearBtn = document.getElementById('clearBtn');
        
        const selectTrigger = document.getElementById('selectTrigger');
        const selectOptions = document.getElementById('selectOptions');

        function resizeCanvas() {
            const temp = document.createElement('canvas');
            temp.width = canvas.width; temp.height = canvas.height;
            temp.getContext('2d').drawImage(canvas, 0, 0);
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            ctx.drawImage(temp, 0, 0, temp.width/dpr, temp.height/dpr);
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        }

        // Procedural Mini-Renderer Engine to generate dropdown previews automatically
        function generateBrushPreviews() {
            selectOptions.innerHTML = '';
            
            Object.keys(Brushes).forEach(key => {
                const b = Brushes[key];
                
                // Spin up an offscreen micro-canvas
                const pCanvas = document.createElement('canvas');
                pCanvas.width = 70; pCanvas.height = 32;
                const pCtx = pCanvas.getContext('2d');
                pCtx.lineCap = 'round'; pCtx.lineJoin = 'round';
                
                // Draw a standard test curve signature representing the stroke style
                const p1 = { x: 5, y: 22, t: 0 };
                const p2 = { x: 35, y: 8, t: 100 };
                const p3 = { x: 65, y: 16, t: 200 };
                
                const dummyStyle = { color: '#000000', size: 6, lastWidth: 6 };
                paintProceduralStroke(pCtx, p1, p2, b, dummyStyle, null);
                paintProceduralStroke(pCtx, p2, p3, b, dummyStyle, null);
                
                const dataUrl = pCanvas.toDataURL();
                
                // Build options list element
                const item = document.createElement('div');
                item.className = 'option-item';
                item.dataset.value = key;
                item.innerHTML = `<img src="${dataUrl}" alt="swatch"> <span>${b.name}</span>`;
                
                item.addEventListener('click', () => {
                    activeBrushKey = key;
                    selectTrigger.innerHTML = item.innerHTML;
                    selectOptions.classList.remove('show');
                });
                
                selectOptions.appendChild(item);
                
                // Default fallback initialization
                if (key === activeBrushKey) {
                    selectTrigger.innerHTML = item.innerHTML;
                }
            });
        }

        // Global Event listener closure toggle for drop menus
        selectTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            selectOptions.classList.toggle('show');
        });
        document.addEventListener('click', () => selectOptions.classList.remove('show'));

        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top, t: Date.now() };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getCoordinates(e);
            points = [pos];
            colorIndicator.style.background = colorPicker.value;
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            
            const pos = getCoordinates(e);
            points.push(pos);

            if (points.length > 1) {
                const style = {
                    color: mode === 'eraser' ? '#ffffff' : colorPicker.value,
                    size: parseInt(strokeWidth.value),
                    lastWidth: lastWidth
                };
                // Call externalized logic
                lastWidth = paintProceduralStroke(ctx, points[points.length - 2], points[points.length - 1], Brushes[activeBrushKey], style, canvas);
            }
            if (points.length > 10) points.shift();
        }

        function stopDrawing() { isDrawing = false; points = []; }

        if (window.PointerEvent) {
            canvas.addEventListener('pointerdown', startDrawing);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerup', stopDrawing);
        } else {
            canvas.addEventListener('touchstart', startDrawing);
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);
        }

        penBtn.addEventListener('click', () => { mode = 'pen'; penBtn.classList.add('active'); eraserBtn.classList.remove('active'); });
        eraserBtn.addEventListener('click', () => { mode = 'eraser'; eraserBtn.classList.add('active'); penBtn.classList.remove('active'); });
        clearBtn.addEventListener('click', () => { if(confirm("Clear?")) ctx.clearRect(0, 0, canvas.width, canvas.height); });
        colorPicker.addEventListener('input', () => colorIndicator.style.background = colorPicker.value);

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', () => { 
            resizeCanvas(); 
            generateBrushPreviews();
            colorIndicator.style.background = colorPicker.value;
        });
  </script>
</body>

</html>
